# config/database.yml

default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5

development:
  <<: *default
  database: my_andromeda_app_development

# =======================================================
# SECTION ADDED FOR TEST ENVIRONMENT
test:
  <<: *default
  database: my_andromeda_app_test
# =======================================================

production:
  <<: *default
  database: my_andromeda_app_production
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: <%= ENV['DB_HOST'] %>
